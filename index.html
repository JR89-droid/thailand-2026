<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="Private, offline-first travel companion for one family's Thailand expedition — itinerary, phrasebook, baht converter, city guides and more, behind a family passcode.">
<meta name="theme-color" content="#F4F3EF">
<title>Thailand MMXXVI · Family Expedition</title>
<!-- PWA — active when served from the family link; harmless as a plain file -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icon-180.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Thailand 26">
<meta name="tt-build" content="2026-07-08.1">
<style>
/* ============================================================
   THAILAND MMXXVI — private family expedition
   Design system adapted from the AISA editorial tokens.
   Self-hosted fonts, zero external calls, offline-first.
   ============================================================ */
@font-face{font-family:'Archivo';font-style:normal;font-weight:400;font-display:swap;src:url(fonts/Archivo-400.woff2) format('woff2')}
@font-face{font-family:'Archivo';font-style:normal;font-weight:500;font-display:swap;src:url(fonts/Archivo-500.woff2) format('woff2')}
@font-face{font-family:'Archivo';font-style:normal;font-weight:600;font-display:swap;src:url(fonts/Archivo-600.woff2) format('woff2')}
@font-face{font-family:'Archivo';font-style:normal;font-weight:700;font-display:swap;src:url(fonts/Archivo-700.woff2) format('woff2')}
@font-face{font-family:'Cormorant Garamond';font-style:normal;font-weight:500;font-display:swap;src:url(fonts/CormorantGaramond-500.woff2) format('woff2')}
@font-face{font-family:'Cormorant Garamond';font-style:italic;font-weight:500;font-display:swap;src:url(fonts/CormorantGaramond-500i.woff2) format('woff2')}
@font-face{font-family:'Cormorant Garamond';font-style:normal;font-weight:600;font-display:swap;src:url(fonts/CormorantGaramond-600.woff2) format('woff2')}
@font-face{font-family:'EB Garamond';font-style:normal;font-weight:400;font-display:swap;src:url(fonts/EBGaramond-400.woff2) format('woff2')}
@font-face{font-family:'EB Garamond';font-style:italic;font-weight:400;font-display:swap;src:url(fonts/EBGaramond-400i.woff2) format('woff2')}
@font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400;font-display:swap;src:url(fonts/JetBrainsMono-400.woff2) format('woff2')}
@font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:600;font-display:swap;src:url(fonts/JetBrainsMono-600.woff2) format('woff2')}

:root{
  --ink:#0B0B0C; --charcoal:#232327; --paper:#F4F3EF; --white:#FCFBF9;
  --line:rgba(11,11,12,.13); --line-strong:rgba(11,11,12,.32);
  --accent:#B08D57; --accent-ink:#7E602F; --accent-soft:rgba(176,141,87,.14); --accent-line:rgba(176,141,87,.34);
  --ok:#3E6B4F; --ok-soft:rgba(62,107,79,.09);
  --warn:#8A4B2D; --warn-soft:rgba(138,75,45,.09);
  --muted:rgba(11,11,12,.62); --faint:rgba(11,11,12,.45);
  --display:'Cormorant Garamond',Georgia,serif;
  --body:'EB Garamond',Georgia,serif;
  --util:'Archivo',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',Consolas,monospace;
  --ls-over:.32em; --ls-caps:.18em;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
[hidden]{display:none!important}
html{scroll-behavior:smooth}
body{
  background:var(--paper);color:var(--ink);
  font-family:var(--body);font-size:17px;line-height:1.5;
  -webkit-font-smoothing:antialiased;min-height:100vh;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font:inherit;color:inherit}
svg{display:block}
::selection{background:var(--accent-soft)}

/* ---------- type utilities ---------- */
.overline{font-family:var(--util);font-size:10.5px;font-weight:600;letter-spacing:var(--ls-over);text-transform:uppercase;color:var(--accent-ink)}
.caps{font-family:var(--util);font-size:11.5px;font-weight:600;letter-spacing:var(--ls-caps);text-transform:uppercase}
.display{font-family:var(--display);font-weight:500;line-height:1.08}
.mono{font-family:var(--mono);font-size:.85em}
.muted{color:var(--muted)}
.sec-num{font-family:var(--mono);font-size:11px;color:var(--accent-ink);letter-spacing:.1em}

/* ---------- header ---------- */
header.site{
  position:sticky;top:0;z-index:40;
  background:rgba(244,243,239,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
header.site .bar{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  max-width:680px;margin:0 auto;
  padding:calc(12px + env(safe-area-inset-top)) 20px 12px;
}
.brand{display:flex;align-items:baseline;gap:9px;white-space:nowrap}
.brand .word{font-family:var(--display);font-size:21px;font-weight:600;letter-spacing:.02em}
.brand .sub{font-family:var(--util);font-size:9px;font-weight:600;letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--accent-ink)}
.hbtn{padding:8px;border:1px solid transparent;border-radius:2px;color:var(--charcoal)}
.hbtn:active{border-color:var(--line-strong)}

/* ---------- layout ---------- */
main{max-width:680px;margin:0 auto;padding:0 20px calc(92px + env(safe-area-inset-bottom))}
.view{display:none}
.view.active{display:block;animation:fadeUp .35s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.crumbs{padding:16px 0 0;font-family:var(--util);font-size:11.5px;letter-spacing:.04em;color:var(--faint)}
.crumbs .sep{margin:0 7px;color:var(--accent)}
.crumbs button{font:inherit;color:inherit;letter-spacing:inherit}
.crumbs button:active{color:var(--ink)}

.section-head{display:flex;align-items:baseline;gap:14px;margin:26px 0 6px}
h2.display{font-size:clamp(26px,7vw,34px);font-weight:500}
p.lede{font-size:16.5px;color:var(--muted);margin:6px 0 18px;max-width:56ch}

/* ---------- hero ---------- */
.hero{padding:38px 0 26px;border-bottom:1px solid var(--line)}
.hero h1{font-family:var(--display);font-weight:500;font-size:clamp(34px,10vw,52px);line-height:1.06;margin:14px 0 12px;max-width:16ch}
.hero .epigraph{font-family:var(--display);font-style:italic;font-size:17px;color:var(--muted);margin-top:10px}
.stats-band{display:flex;border-bottom:1px solid var(--line)}
.stats-band .stat{flex:1;padding:18px 6px 16px;border-right:1px solid var(--line);text-align:center}
.stats-band .stat:last-child{border-right:0}
.stat .num{font-family:var(--display);font-size:clamp(30px,9vw,42px);font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
.stat .lbl{margin-top:5px;font-family:var(--util);font-size:9.5px;font-weight:600;letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--muted)}
.hero-line{padding:14px 0;border-bottom:1px solid var(--line);font-size:15.5px;color:var(--muted)}
.hero-line b{color:var(--ink);font-weight:600}

/* word of the day */
.wotd{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--line)}
.wotd .th{font-size:22px;line-height:1.2}
.wotd .pt{flex:1}
.wotd .en{font-family:var(--util);font-size:12.5px;font-weight:500;color:var(--muted);margin-top:1px}
.wotd .ph{font-family:var(--body);font-style:italic;font-size:14px;color:var(--accent-ink)}

/* ---------- cards ---------- */
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:22px 0}
@media(min-width:560px){.card-grid{grid-template-columns:1fr 1fr 1fr}}
.qcard{
  position:relative;background:var(--white);border:1px solid var(--line);border-radius:3px;
  padding:16px 14px 14px;text-align:left;display:flex;flex-direction:column;gap:5px;overflow:hidden;
  transition:border-color .25s var(--ease),transform .25s var(--ease);
}
.qcard:active{border-color:var(--accent-line);transform:translateY(-2px)}
.qcard h3{font-family:var(--display);font-size:19px;font-weight:600;line-height:1.12}
.qcard small{font-family:var(--body);font-size:13px;color:var(--muted);line-height:1.4}
.qcard .big-num{position:absolute;right:6px;top:-6px;font-family:var(--display);font-size:56px;font-weight:500;color:var(--accent-soft);line-height:1;user-select:none;pointer-events:none}
.progress{height:3px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:8px}
.progress .fill{height:100%;background:var(--accent);transition:width .35s var(--ease)}

.card{background:var(--white);border:1px solid var(--line);border-radius:3px;padding:18px;margin:12px 0}
.note-block{background:var(--warn-soft);border:1px solid rgba(138,75,45,.25);border-left:3px solid var(--warn);border-radius:2px;padding:12px 15px;margin:10px 0;font-size:15px}
.expected-block{background:var(--ok-soft);border:1px solid rgba(62,107,79,.22);border-left:3px solid var(--ok);border-radius:2px;padding:12px 15px;margin:10px 0;font-size:15px}

.credit{text-align:center;padding:30px 10px 8px}
.credit .tagline{font-family:var(--display);font-style:italic;font-size:18px}
.credit .fine{font-family:var(--util);font-size:10.5px;color:var(--muted);letter-spacing:.04em;margin-top:8px;line-height:1.7}

/* ---------- buttons / chips / tabs ---------- */
.btn{
  font-family:var(--util);font-size:11.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  padding:13px 22px;border-radius:2px;border:1px solid var(--ink);background:var(--ink);color:var(--white);
  transition:background .2s var(--ease);display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;
}
.btn:active{background:var(--charcoal)}
.btn.ghost{background:transparent;color:var(--ink);border-color:var(--line-strong)}
.btn.ghost:active{border-color:var(--ink);background:transparent}
.btn.warn{background:transparent;color:var(--warn);border-color:rgba(138,75,45,.4)}
.btn.slim{width:auto;padding:9px 16px}
.chip{
  display:inline-flex;align-items:center;font-family:var(--mono);font-size:11.5px;
  background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:2px;padding:3px 9px;white-space:nowrap;
}
.chip.plain{background:transparent;border-color:var(--line-strong);color:var(--muted)}
.chiprow{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px}
.fchip{
  font-family:var(--util);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:8px 13px;border:1px solid var(--line-strong);border-radius:2px;color:var(--muted);background:transparent;
}
.fchip.on{background:var(--ink);color:var(--white);border-color:var(--ink)}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line-strong);margin:16px 0 20px}
.tabs button{
  font-family:var(--util);font-size:11.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:10px 16px;color:var(--faint);border-bottom:2px solid transparent;margin-bottom:-1px;
}
.tabs button.on{color:var(--ink);border-bottom-color:var(--accent)}
.method-label{margin:26px 0 10px;display:flex;align-items:center;gap:12px}
.method-label::after{content:"";flex:1;height:1px;background:var(--line-strong)}

/* ---------- fieldlist / tables ---------- */
.fieldlist{border:1px solid var(--line);border-radius:2px;overflow:hidden;background:var(--white)}
.frow{display:grid;grid-template-columns:minmax(90px,34%) 1fr;border-bottom:1px solid var(--line)}
.frow:last-child{border-bottom:none}
.fname{padding:10px 13px;font-family:var(--util);font-size:12px;font-weight:500;background:var(--paper);border-right:1px solid var(--line)}
.fval{padding:10px 13px;font-family:var(--mono);font-size:12.5px;overflow-wrap:anywhere}
.tbl{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--line);font-size:15px}
.tbl th{text-align:left;font-family:var(--util);font-size:10px;font-weight:600;letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--muted);padding:10px 13px;border-bottom:1px solid var(--line-strong);background:var(--paper)}
.tbl td{padding:10px 13px;border-bottom:1px solid var(--line);vertical-align:top}
.tbl tr:last-child td{border-bottom:0}
.tbl .mono{color:var(--accent-ink)}

/* ---------- itinerary ---------- */
.daycard{background:var(--white);border:1px solid var(--line);border-radius:3px;margin:14px 0;overflow:hidden}
.dayhead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:15px 16px 12px;border-bottom:1px solid var(--line)}
.dayhead h3{font-family:var(--display);font-size:22px;font-weight:600;line-height:1.1}
.dayhead .ov{margin-bottom:3px}
.itemrow{display:flex;gap:14px;align-items:baseline;width:100%;text-align:left;padding:11px 16px;border-bottom:1px solid var(--line)}
.itemrow:last-of-type{border-bottom:none}
.itemrow .t{font-family:var(--mono);font-size:11.5px;color:var(--accent-ink);min-width:44px;font-variant-numeric:tabular-nums}
.itemrow .x{font-size:15.5px;flex:1;line-height:1.4}
.addrow{width:100%;text-align:left;padding:11px 16px;font-family:var(--util);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-ink);border-top:1px solid var(--line)}
.iconbtn{padding:7px;border:1px solid var(--line);border-radius:2px;color:var(--charcoal);background:var(--white)}
.iconbtn:active{border-color:var(--accent-line)}

/* ---------- phrasebook ---------- */
.phrase{display:flex;align-items:center;gap:13px;background:var(--white);border:1px solid var(--line);border-radius:3px;padding:11px 14px;margin-bottom:8px}
.phrase .pt{flex:1;min-width:0}
.phrase .en{font-family:var(--util);font-size:13.5px;font-weight:500}
.phrase .th{font-size:18px;margin:2px 0 1px;line-height:1.35}
.phrase .ph{font-family:var(--body);font-style:italic;font-size:13.5px;color:var(--accent-ink)}
.speakbtn{width:40px;height:40px;flex:none;border:1px solid var(--accent-line);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--accent);background:var(--accent-soft);transition:transform .15s}
.speakbtn:active{transform:scale(.88)}
.speakbtn.talking{background:var(--accent);color:var(--white);animation:pulse 1s infinite}
@keyframes pulse{50%{transform:scale(1.07)}}

/* ---------- money ---------- */
.convrow{display:flex;align-items:stretch;gap:10px;margin-bottom:12px}
.convbox{flex:1;background:var(--white);border:1px solid var(--line);border-radius:2px;padding:10px 12px}
.convbox label{display:block;font-family:var(--util);font-size:9.5px;font-weight:600;letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.convbox input{width:100%;background:none;border:none;outline:none;font-family:var(--mono);font-size:21px;font-weight:600;font-variant-numeric:tabular-nums}
.swap{display:flex;align-items:center;color:var(--faint)}
.raterow{display:flex;align-items:center;gap:8px;font-family:var(--util);font-size:12.5px;color:var(--muted);flex-wrap:wrap;margin:6px 0}
.raterow select,.raterow input{background:var(--white);border:1px solid var(--line-strong);border-radius:2px;padding:6px 9px;font-family:var(--mono);font-size:12.5px;outline:none}
.raterow input{width:76px;text-align:center}
.chipgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.mchip{background:var(--white);border:1px solid var(--line);border-radius:2px;padding:9px 6px;text-align:center}
.mchip b{display:block;font-family:var(--mono);font-size:13px;color:var(--accent-ink)}
.mchip span{font-family:var(--util);font-size:11px;color:var(--muted)}

/* expenses */
.exp-form{background:var(--white);border:1px solid var(--line);border-radius:3px;padding:16px;margin:12px 0}
.exp-form .row2{display:flex;gap:10px}
.exp-form .row2>*{flex:1}
.field{margin-bottom:12px}
.field label{display:block;font-family:var(--util);font-size:10px;font-weight:600;letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{
  width:100%;background:var(--paper);border:1px solid var(--line-strong);border-radius:2px;
  padding:10px 12px;font-size:15px;outline:none;font-family:var(--util);
}
.field textarea{min-height:84px;resize:vertical;font-family:var(--body)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.exprow{display:flex;align-items:baseline;gap:10px;width:100%;text-align:left;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--white)}
.exprow:last-child{border-bottom:none}
.exprow .amt{font-family:var(--mono);font-size:14px;font-weight:600;min-width:74px;font-variant-numeric:tabular-nums}
.exprow .note{flex:1;font-size:14.5px}
.exprow .who{font-family:var(--util);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.explist{border:1px solid var(--line);border-radius:3px;overflow:hidden;margin-bottom:14px}
.expday{padding:9px 14px;background:var(--paper);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:baseline}

/* ---------- dishes ---------- */
.dishscroll{display:flex;gap:12px;overflow-x:auto;padding:6px 20px 16px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;margin:0 -20px}
.dishscroll::-webkit-scrollbar{display:none}
.dish{flex:0 0 74%;max-width:300px;scroll-snap-align:center;background:var(--white);border:1px solid var(--line);border-radius:3px;padding:18px 16px}
.dish .de{font-size:34px;line-height:1}
.dish h3{font-family:var(--display);font-size:22px;font-weight:600;margin:9px 0 1px}
.dish .dth{font-size:14px;color:var(--muted);margin-bottom:7px}
.dish .dp{font-family:var(--mono);font-size:11.5px;color:var(--accent-ink);margin-bottom:7px}
.dish .spice{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.dish .spice i{width:8px;height:8px;border-radius:50%;border:1px solid var(--accent);display:inline-block}
.dish .spice i.f{background:var(--accent)}
.dish .spice span{font-family:var(--util);font-size:9.5px;font-weight:600;letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--muted)}
.dish p{font-size:14px;color:var(--muted);margin-bottom:9px;line-height:1.45}
.dish .how{font-size:13px;background:var(--ok-soft);border:1px solid rgba(62,107,79,.22);border-radius:2px;padding:8px 11px;color:var(--ok)}
@keyframes pop{from{transform:scale(.9);opacity:.4}to{transform:scale(1);opacity:1}}

/* ---------- guide ---------- */
.sosband{display:grid;grid-template-columns:1fr 1fr;border:1px solid rgba(138,75,45,.35);border-radius:3px;overflow:hidden;margin:12px 0}
.sositem{padding:14px 12px;background:var(--warn-soft);text-align:center;border-right:1px solid rgba(138,75,45,.2);border-bottom:1px solid rgba(138,75,45,.2)}
.sositem b{display:block;font-family:var(--mono);font-size:22px;font-weight:600}
.sositem span{font-family:var(--util);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--warn)}
details.acc{background:var(--white);border:1px solid var(--line);border-radius:3px;margin-bottom:10px;overflow:hidden}
details.acc summary{list-style:none;display:flex;align-items:center;gap:11px;padding:14px 16px;cursor:pointer;font-family:var(--util);font-size:12.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
details.acc summary::-webkit-details-marker{display:none}
details.acc summary .sec-num{min-width:24px}
details.acc summary::after{content:'›';margin-left:auto;color:var(--faint);font-size:19px;font-family:var(--body);transition:transform .25s var(--ease)}
details.acc[open] summary::after{transform:rotate(90deg)}
details.acc .accbody{padding:2px 18px 16px;font-size:15px;color:var(--muted)}
details.acc .accbody li{margin:0 0 9px 17px}
details.acc .accbody b{color:var(--ink)}
.taxi-citylabel{display:flex;align-items:center;gap:4px;margin:18px 0 8px}
.taxi-citylabel .caps{color:var(--accent-ink)}
.taxirow{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:2px;overflow:hidden;background:var(--white);margin-bottom:8px}
.taximain{flex:1;text-align:left;padding:12px 15px;background:transparent;min-width:0}
.taximain .tb-en{font-family:var(--util);font-size:13.5px;font-weight:500}
.taximain .tb-th{font-size:13.5px;color:var(--accent-ink);margin-top:2px}
.taxix{flex:none;width:46px;border-left:1px solid var(--line);color:var(--faint);font-size:17px;display:flex;align-items:center;justify-content:center;background:transparent}
.taxix:active{color:var(--warn);background:var(--warn-soft)}

/* ---------- vault ---------- */
.vault-sec{margin-bottom:6px}
.ventry{display:flex;align-items:baseline;gap:12px;width:100%;text-align:left;background:var(--white);border:1px solid var(--line);border-radius:2px;padding:11px 14px;margin-bottom:7px}

/* ---------- journal ---------- */
.jentry{background:var(--white);border:1px solid var(--line);border-radius:3px;padding:16px 17px;margin-bottom:12px}
.jhead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:7px}

.moodrow button.on{background:var(--accent-ink);border-color:var(--accent-ink);color:var(--white)}

/* ---------- packing ---------- */
.packgroup{margin-bottom:16px}
.packitem{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:9px 2px;font-size:15px;border-bottom:1px solid var(--line)}
.packitem .box{width:19px;height:19px;flex:none;border:1px solid var(--line-strong);border-radius:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.packitem.done .box{background:var(--accent-ink);border-color:var(--accent-ink);color:var(--white);font-size:12px}
.packitem.done .pl{color:var(--faint);text-decoration:line-through}
.addcustom{display:flex;gap:8px;margin-top:12px}
.addcustom input{flex:1;background:var(--white);border:1px solid var(--line-strong);border-radius:2px;padding:10px 12px;font-family:var(--util);font-size:14px;outline:none}

/* ---------- bottom nav ---------- */
nav#nav{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:rgba(244,243,239,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-top:1px solid var(--line-strong);
}
nav#nav .inner{display:flex;max-width:680px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
nav#nav button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 2px 9px;color:var(--faint);border-top:2px solid transparent;margin-top:-1px;
  transition:color .2s;
}
nav#nav button span{font-family:var(--util);font-size:9px;font-weight:600;letter-spacing:var(--ls-caps);text-transform:uppercase}
nav#nav button.on{color:var(--ink);border-top-color:var(--accent)}

/* ---------- lock screen ---------- */
#lock{
  position:fixed;inset:0;z-index:200;background:var(--paper);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 26px;text-align:center;
}
#lock .sun{width:64px;height:64px;border-radius:50%;background:var(--accent);position:relative;margin-bottom:26px}
#lock .sun::after{content:"";position:absolute;inset:-13px;border:1px solid var(--accent-line);border-radius:50%}
#lock h1{font-family:var(--display);font-size:clamp(34px,9vw,46px);font-weight:500;line-height:1.05;margin:12px 0 8px}
#lock .lede{font-size:16px;color:var(--muted);max-width:34ch;margin-bottom:26px}
#lock form{width:100%;max-width:320px}
#lock input{
  width:100%;text-align:center;background:var(--white);border:1px solid var(--line-strong);border-radius:2px;
  padding:13px;font-family:var(--mono);font-size:16px;letter-spacing:.14em;outline:none;margin-bottom:10px;
}
#lock input:focus{border-color:var(--accent)}
#lock .err{font-family:var(--util);font-size:12px;color:var(--warn);min-height:18px;margin:6px 0 2px}
#lock .fine{font-family:var(--util);font-size:10.5px;color:var(--muted);letter-spacing:.04em;margin-top:26px;line-height:1.7}
#lock.busy input,#lock.busy .btn{opacity:.5;pointer-events:none}

/* ---------- taxi overlay ---------- */
#taxioverlay{
  position:fixed;inset:0;z-index:150;background:#fff;color:#111;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:28px;cursor:pointer;
}
#taxioverlay .tsmall{font-family:var(--util);font-size:13px;color:#777;margin-bottom:18px;letter-spacing:.06em;text-transform:uppercase}
#taxioverlay .tbig{font-size:min(11vw,52px);font-weight:700;line-height:1.3;word-break:break-word;font-family:system-ui,sans-serif}
#taxioverlay .ten{font-size:17px;color:#444;margin-top:16px}
#taxioverlay .tclose{position:absolute;bottom:calc(20px + env(safe-area-inset-bottom));font-family:var(--util);font-size:11px;color:#999;letter-spacing:.1em;text-transform:uppercase}

/* ---------- sheet ---------- */
#sheetback{position:fixed;inset:0;z-index:90;background:rgba(11,11,12,.35);animation:fadein .2s}
@keyframes fadein{from{opacity:0}}
#sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:95;max-width:680px;margin:0 auto;max-height:88vh;overflow-y:auto;
  background:var(--paper);border:1px solid var(--line-strong);border-bottom:none;border-radius:6px 6px 0 0;
  padding:12px 20px calc(24px + env(safe-area-inset-bottom));
  box-shadow:0 -20px 60px rgba(11,11,12,.18);
  animation:slideup .32s var(--ease);
}
@keyframes slideup{from{transform:translateY(55%)}}
#sheet .grab{width:38px;height:3px;border-radius:2px;background:var(--line-strong);margin:0 auto 14px}
#sheet h3.sh{font-family:var(--display);font-size:24px;font-weight:600;margin-bottom:14px;display:flex;align-items:baseline;justify-content:space-between;gap:10px}
#sheet h3.sh .xbtn{font-family:var(--util);font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:5px 6px}
.btnrow{display:flex;gap:10px;margin-top:14px}
.btnrow .btn{flex:1}
.more-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ---------- update banner ---------- */
#updateBar{
  position:fixed;left:0;right:0;top:0;z-index:300;
  background:var(--ink);color:var(--white);
  font-family:var(--util);font-size:11.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  padding:calc(12px + env(safe-area-inset-top)) 16px 12px;text-align:center;width:100%;
  animation:slidedown .35s var(--ease);
}
@keyframes slidedown{from{transform:translateY(-100%)}}
#updateBar span{color:var(--accent);margin-left:8px}

/* ---------- home quick strip ---------- */
.quickstrip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0 2px}
.qbtn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
  background:var(--white);color:var(--ink);border:1px solid var(--line-strong);border-radius:3px;

}
.qbtn:active{border-color:var(--accent-line);transform:translateY(-2px)}
.qbtn svg{color:var(--accent)}
.qbtn span{font-family:var(--util);font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;line-height:1.15}

/* ---------- phrasebook jump row ---------- */
.jumprow{
  position:sticky;z-index:30;top:calc(62px + env(safe-area-inset-top));
  display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  background:var(--paper);padding:11px 20px;margin:8px -20px 6px;border-bottom:1px solid var(--line);
  scrollbar-width:none;
}
.jumprow::-webkit-scrollbar{display:none}
.jumpchip{
  flex:none;font-family:var(--util);font-size:11px;font-weight:600;letter-spacing:.04em;
  padding:7px 12px;border:1px solid var(--line-strong);border-radius:2px;color:var(--charcoal);background:var(--white);white-space:nowrap;
}
.jumpchip:active{border-color:var(--accent);color:var(--accent)}

/* ---------- cities: sights gallery ---------- */
.sightgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:6px 0 4px}
.sightcard{background:var(--white);border:1px solid var(--line);border-radius:3px;overflow:hidden;display:flex;flex-direction:column}
.sightimg{display:block;width:100%;padding:0;border:none;background:var(--paper);line-height:0;aspect-ratio:3/2;overflow:hidden}
.sightimg img{width:100%;height:100%;object-fit:cover;display:block}
.sightbody{padding:12px 13px 14px;display:flex;flex-direction:column;gap:5px}
.sightbody h3{font-family:var(--display);font-size:18px;font-weight:600;line-height:1.14}
.sightbody p{font-size:13.5px;color:var(--muted);line-height:1.42}
.sighttip{font-size:12.5px;background:var(--ok-soft);border:1px solid rgba(62,107,79,.22);border-radius:2px;padding:7px 9px;color:var(--ok);line-height:1.4}

/* ---------- cities: venues ---------- */
.venuecard{background:var(--white);border:1px solid var(--line);border-radius:3px;padding:15px 16px;margin-bottom:10px}
.venuecard .vtop{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.venuecard h3{font-family:var(--display);font-size:20px;font-weight:600;line-height:1.15}
.vtier{font-family:var(--util);font-size:9.5px;font-weight:600;letter-spacing:var(--ls-caps);text-transform:uppercase;padding:3px 8px;border-radius:2px;white-space:nowrap;flex:none}
.vtier.lux{background:var(--accent-soft);border:1px solid var(--accent-line);color:var(--accent-ink)}
.vtier.local{background:var(--ok-soft);border:1px solid rgba(62,107,79,.28);color:var(--ok)}
.venuecard .vmeta{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:7px 0 8px}
.venuecard .vrating{font-family:var(--mono);font-size:12px;color:var(--accent-ink)}
.venuecard .vprice{font-family:var(--mono);font-size:12px;color:var(--muted)}
.venuecard .vblurb{font-size:14.5px;color:var(--muted);line-height:1.45;margin-bottom:8px}
.venuecard .vaddr{font-size:12.5px;color:var(--faint);margin-bottom:10px;font-family:var(--util);line-height:1.4}
.vadult{font-family:var(--util);font-size:9.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--warn);border:1px solid rgba(138,75,45,.45);border-radius:2px;padding:3px 7px}
.maplink{display:inline-flex;align-items:center;gap:7px;font-family:var(--util);font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);border:1px solid var(--line-strong);border-radius:2px;padding:9px 13px;text-decoration:none}
.maplink:active{border-color:var(--accent);color:var(--accent)}

/* ---------- lightbox ---------- */
#lightbox{position:fixed;inset:0;z-index:160;background:rgba(11,11,12,.92);display:flex;align-items:center;justify-content:center;padding:20px;cursor:pointer}
#lightbox img{max-width:100%;max-height:80vh;object-fit:contain;border-radius:3px}
#lightbox .lbcap{position:absolute;bottom:calc(22px + env(safe-area-inset-bottom));left:0;right:0;text-align:center;color:#eee;font-family:var(--util);font-size:12px;letter-spacing:.04em;padding:0 20px}
#lightbox .lbclose{position:absolute;top:calc(14px + env(safe-area-inset-top));right:18px;color:#fff;font-size:24px;font-family:var(--util);padding:6px 10px}

/* ---------- settle-up ---------- */
.settlerow{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.settlerow:last-of-type{border-bottom:none}
.settlerow .sname{font-family:var(--util);font-size:13px;font-weight:600;min-width:66px}
.settlerow .spaid{font-size:12px;color:var(--muted);flex:1}
.settlerow .sbal{font-family:var(--util);font-size:12px;font-weight:600}
.txrow{font-size:14.5px;padding:6px 0}
.txrow .mono{color:var(--accent-ink)}

/* ---------- quiz ---------- */
.quizbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:16px 0 4px}
.qprog{font-size:12px;color:var(--muted)}
.quizscore{font-size:11px;color:var(--accent-ink);margin-bottom:12px}
.quizq{font-family:var(--display);font-size:clamp(21px,5.5vw,26px);font-weight:600;line-height:1.2;margin-bottom:16px}
.quizopts{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.quizopt{
  text-align:left;background:var(--white);border:1px solid var(--line-strong);border-radius:3px;
  padding:14px 16px;font-family:var(--util);font-size:15px;font-weight:500;transition:border-color .15s var(--ease);
}
.quizopt:active{border-color:var(--accent)}
.quizopt.correct{background:var(--ok-soft);border-color:var(--ok);color:var(--ok);font-weight:600}
.quizopt.wrong{background:var(--warn-soft);border-color:var(--warn);color:var(--warn)}
.quizopt.dim{opacity:.5}
.quizfact{border-radius:3px;padding:12px 15px;margin-bottom:14px;font-size:14.5px;line-height:1.5}
.quizfact.right{background:var(--ok-soft);border:1px solid rgba(62,107,79,.28)}
.quizfact.notright{background:var(--warn-soft);border:1px solid rgba(138,75,45,.28)}
.handoff{text-align:center;padding:30px 16px;border:1px dashed var(--line-strong);border-radius:4px;margin:16px 0}
.handicon{font-size:38px;margin-bottom:6px}
.handoff h3{font-size:22px;font-weight:600}
.handname{font-family:var(--display);font-size:34px;font-weight:600;color:var(--accent-ink);margin:4px 0 10px}
.quizend{text-align:center;padding:20px 10px}
.bigscore{font-size:64px;font-weight:600;line-height:1;margin:6px 0}
.bigscore span{font-size:24px;color:var(--muted);margin-left:6px}
.podium{margin:16px 0}
.podrow{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--line);border-radius:3px;margin-bottom:8px;background:var(--white)}
.podrow.win{border-color:var(--accent-line);background:var(--accent-soft)}
.pod-m{font-size:22px;min-width:30px}
.pod-n{flex:1;text-align:left;font-family:var(--display);font-size:20px;font-weight:600}

/* ---------- photo credits ---------- */
.credits-acc{margin-top:16px;max-width:540px;margin-left:auto;margin-right:auto}
.credits-acc summary{font-family:var(--util);font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);cursor:pointer;text-align:center;list-style:none}
.credits-acc summary::-webkit-details-marker{display:none}
.credits-list{font-family:var(--util);font-size:10px;color:var(--faint);line-height:1.7;margin-top:10px;letter-spacing:.02em;text-align:left}

@media print{
  header.site,nav#nav,#sheet,#sheetback,.credit,.addrow,.iconbtn{display:none!important}
  body{background:#fff}
  .view{display:none}.view.active{display:block}
}

<script>
'use strict';
/* ============================================================
   THAILAND MMXXVI — private family expedition
   Single-origin app: offline-first, encrypted family vault,
   no accounts, no tracking, no external services. By Claude.
   ============================================================ */

const KEY = 'thai-trip-v1';          // state (kept from v1 so family devices migrate)
const KEYSLOT = 'thai-trip-key';     // derived unlock key (device-local)
const KIDSLOT = 'thai-trip-kid';     // key-generation id (additive; drives stale-key re-lock)
const $ = s => document.querySelector(s);
const uid = () => Math.random().toString(36).slice(2, 9);
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const todayStr = () => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); };

/* ---------------- passcode / crypto ----------------
   PBKDF2-SHA256 (310k) -> 64 bytes: [0..31] verifier, [32..63] AES-GCM key.
   AUTH is generated at build time; the passcode itself never appears here. */
const AUTH = { salt: 'Gm6wL/SDIqsWoG2jHqr4PA==', iter: 310000, verify: 's7KZzMK1lIoJy+HmbHySir5ijQChAuCXtOyWNoU8GPc=', kid: 'k2' };
const VAULT_SEED = null; /* encrypted family blob gets baked here */

const subtle = (window.crypto && crypto.subtle) ? crypto.subtle : null;
const b64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
const unb64 = str => Uint8Array.from(atob(str), c => c.charCodeAt(0));

async function derive(pass){
  const km = await subtle.importKey('raw', new TextEncoder().encode(pass.trim().toLowerCase()), 'PBKDF2', false, ['deriveBits']);
  const bits = await subtle.deriveBits({ name:'PBKDF2', hash:'SHA-256', salt: unb64(AUTH.salt), iterations: AUTH.iter }, km, 512);
  return new Uint8Array(bits);
}
async function aesKey(raw){
  return subtle.importKey('raw', raw, 'AES-GCM', false, ['encrypt','decrypt']);
}
async function encryptJSON(obj){
  const raw = unb64(localStorage.getItem(KEYSLOT) || '');
  if (!raw.length || !subtle) return null;
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await subtle.encrypt({ name:'AES-GCM', iv }, await aesKey(raw), new TextEncoder().encode(JSON.stringify(obj)));
  return 'TT1.' + b64(iv) + '.' + b64(ct);
}
async function decryptBlob(blob){
  try {
    const raw = unb64(localStorage.getItem(KEYSLOT) || '');
    if (!raw.length || !subtle || !blob) return null;
    const [tag, ivb, ctb] = blob.split('.');
    if (tag !== 'TT1') return null;
    const pt = await subtle.decrypt({ name:'AES-GCM', iv: unb64(ivb) }, await aesKey(raw), unb64(ctb));
    return JSON.parse(new TextDecoder().decode(pt));
  } catch (e) { return null; }
}

/* ---------------- state ---------------- */
function makeDefaults(){
  return {
    v: 2,                  // state schema version — drives one-time migration in load()
    travelers: ['Joseph', 'Sia', 'Isa', 'Alexia', 'Nicola'],
    depart: '2026-07-23',

/* One-time v2 migration: swap the old placeholder shape for the real trip,
   without ever touching data the family has personalised. */
function migrateV2(s){
  const OLD = ['Traveler 1', 'Traveler 2', 'Traveler 3'];
  if (Array.isArray(s.travelers) && s.travelers.length === 3 && s.travelers.every((n, i) => n === OLD[i])) {
    s.travelers = ['Joseph', 'Sia', 'Isa', 'Alexia', 'Nicola'];
  }
  if (s.depart === '2026-07-25') s.depart = '2026-07-23';
  if (s.ret === '2026-08-08') s.ret = '2026-08-05';
  if (Array.isArray(s.itinerary)) {
    s.itinerary = s.itinerary.filter(d => !(d && typeof d.sub === 'string' && d.sub.indexOf('Sample day') === 0));
  }
}
function load(){
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s.v !== 2) { migrateV2(s); s.v = 2; }
      const d = makeDefaults();
      for (const k of Object.keys(d)) if (s[k] === undefined) s[k] = d[k];
      return s;
    }
  } catch (e) {}
  return makeDefaults();
}

/* ---------------- helpers ---------------- */
const rate = () => S.rates[S.currency] || 1;
const sign = () => CURR_SIGN[S.currency] || S.currency;
function fmt(v){
  if (!isFinite(v)) return '0';
  return v >= 100 ? Math.round(v).toLocaleString('en-GB') : (Math.round(v * 100) / 100).toString();
}
function names(){ return S.travelers.filter(n => n && n.trim()); }
function packTotals(){
  const base = PACK.reduce((a, g) => a + g.items.length, 0) + S.packCustom.length;
  const total = base * Math.max(names().length, 1);
  let done = 0;
  for (const k in S.packing) if (S.packing[k]) done++;
  return { done: Math.min(done, total), total };
}
function niceDate(iso){
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
}

/* ---------------- navigation ---------------- */
const RENDER = {};
const MORE_VIEWS = ['eat','quiz','guide','vault','journal'];
function showView(name){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('#nav button[data-arg]').forEach(b => b.classList.toggle('on', b.dataset.arg === name));
  $('#moreBtn').classList.toggle('on', MORE_VIEWS.includes(name));
  $('#view-' + name).classList.add('active');
  if (RENDER[name]) RENDER[name]();
  window.scrollTo({ top: 0 });
}
function crumbs(label){
  return '<div class="crumbs"><button data-action="nav" data-arg="home">Home</button><span class="sep">/</span>' + esc(label) + '</div>';
}

function tick(){
  const cd = $('#cd');
  if (!cd || !$('#view-home').classList.contains('active')) return;
  const now = new Date();
  const dep = new Date(S.depart + 'T00:00:00');
  const ret = new Date(S.ret + 'T23:59:59');
  const band = $('#countBand'), title = $('#heroTitle'), epi = $('#heroEpi');
  if (now < dep) {
    const ms = dep - now;
    cd.textContent = Math.floor(ms / 864e5);
    $('#ch').textContent = Math.floor(ms % 864e5 / 36e5);
    $('#cm').textContent = Math.floor(ms % 36e5 / 6e4);
    $('#cs').textContent = Math.floor(ms % 6e4 / 1000);
    title.textContent = 'Thailand is calling.';
    epi.innerHTML = '«Wheels up ' + esc(niceDate(S.depart)) + '.»';
  } else if (now <= ret) {
    const dayN = Math.floor((now - dep) / 864e5) + 1;
    const total = Math.max(1, Math.round((ret - dep) / 864e5) + 1);
    const cityNm = CITY_NAMES[currentCity()];
    band.innerHTML = `<div class="stat"><div class="num">${dayN}</div><div class="lbl">Day</div></div>
      <div class="stat"><div class="num">${total}</div><div class="lbl">Of</div></div>

    title.textContent = 'You are in Thailand.';
    epi.textContent = '«Go make a memory. Write it down tonight.»';
  } else {
    band.innerHTML = `<div class="stat"><div class="num">∎</div><div class="lbl">Trip complete</div></div>`;
    title.textContent = 'The memories keep.';

function findThaiVoice(){
  if (!canSpeak) return;

function speakThai(text, btn){
  if (!canSpeak) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'th-TH'; u.rate = 0.82;
    if (thaiVoice) u.voice = thaiVoice;
    if (btn) { btn.classList.add('talking'); u.onend = u.onerror = () => btn.classList.remove('talking'); }
    speechSynthesis.speak(u);
  } catch (e) {}
}

/* ---------------- MONEY (converter + expenses) ---------------- */
/* Settle-up: every expense splits equally across current travelers. A
   'Together' payer is shared money — it counts toward nobody's personal
   "paid" total, so only personally-paid amounts create debts. Balancing on
   the personal-paid pool always nets to zero. */
function settleUp(){
  const nm = names();
  const N = nm.length;
  if (N < 2 || !S.expenses.length) return null;
  const total = S.expenses.reduce((a, e) => a + e.amt, 0);
  const paid = {};
  nm.forEach(n => paid[n] = 0);
  for (const e of S.expenses) if (e.who !== 'Together' && paid[e.who] !== undefined) paid[e.who] += e.amt;
  const P = nm.reduce((a, n) => a + paid[n], 0);           // personally-paid pool
  const shared = total - P;                                 // 'Together' + any orphaned payer
  const bal = {};
  nm.forEach(n => bal[n] = Math.round(paid[n] - P / N));    // nets to zero
  const creditors = nm.filter(n => bal[n] > 0).map(n => ({ n, v: bal[n] })).sort((a, b) => b.v - a.v);
  const debtors   = nm.filter(n => bal[n] < 0).map(n => ({ n, v: -bal[n] })).sort((a, b) => b.v - a.v);
  const transfers = [];
  let ci = 0, di = 0;
  while (ci < creditors.length && di < debtors.length) {
    const c = creditors[ci], d = debtors[di], amt = Math.min(c.v, d.v);
    if (amt > 0) transfers.push({ from: d.n, to: c.n, amt });
    c.v -= amt; d.v -= amt;
    if (c.v <= 0) ci++;
    if (d.v <= 0) di++;
  }
  return { total, shared, fairShare: Math.round(total / N), paid, bal, transfers };
}
function settleHTML(){
  const s = settleUp();
  if (!s) return '';
  const rows = names().map(n => {
    const b = s.bal[n];
    const tag = b > 0 ? `<span style="color:var(--ok)">gets back ${fmt(b)} ฿</span>`
              : b < 0 ? `<span style="color:var(--warn)">owes ${fmt(-b)} ฿</span>`
              : '<span class="muted">even</span>';
    return `<div class="settlerow"><span class="sname">${esc(n)}</span><span class="spaid mono">paid ${fmt(s.paid[n])} ฿</span><span class="sbal">${tag}</span></div>`;
  }).join('');
  const tx = s.transfers.length
    ? s.transfers.map(t => `<div class="txrow"><span class="mono">${esc(t.from)}</span> owes <span class="mono">${esc(t.to)}</span> <b>${fmt(t.amt)} ฿</b></div>`).join('')
    : '<div class="txrow muted">All square — nobody owes anyone.</div>';
  return `
    <div class="method-label"><span class="caps" style="color:var(--accent-ink)">Settle up</span></div>
    <div class="card" style="padding:14px 16px">
      <div class="caps" style="font-size:10px;color:var(--muted);margin-bottom:10px">Fair share · ${fmt(s.fairShare)} ฿ each${s.shared ? ' · incl. ' + fmt(s.shared) + ' ฿ shared (splits evenly)' : ''}</div>
      ${rows}
      <div class="method-label" style="margin:16px 0 8px"><span class="caps" style="color:var(--accent-ink);font-size:10px">Who pays whom</span></div>
      ${tx}
    </div>`;
}

/* ---------------- QUIZ (Thai Master) ---------------- */
let quizStage = 'menu';   // menu | solo-setup | champ-setup | play | handoff | end
let QZ = null;            // active session
let champSel = [];        // selected players during championship setup
function shuffle(arr){ const a = arr.slice(); for (let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function pickQuestions(n){
  return shuffle(QUIZ).slice(0, n).map(q => {
    const order = shuffle([0, 1, 2, 3]);
    return { q: q.q, cat: q.cat, fact: q.fact, opts: order.map(i => q.c[i]), ans: order.indexOf(q.a) };
  });
}
function recordScore(name, score){
  if (!S.quizScores[name]) S.quizScores[name] = { best: 0, rounds: 0 };
  S.quizScores[name].rounds++;
  if (score > S.quizScores[name].best) S.quizScores[name].best = score;
  save();
}
function startSolo(name){
  QZ = { mode: 'solo', players: [name], qs: pickQuestions(10), idx: 0, turn: 0, scores: { [name]: 0 }, answered: false, chosen: -1 };
  quizStage = 'play'; RENDER.quiz();
}
function startChamp(players){
  const scores = {}; players.forEach(p => scores[p] = 0);
  QZ = { mode: 'champ', players, qs: pickQuestions(10), idx: 0, turn: 0, scores, answered: false, chosen: -1 };
  quizStage = 'handoff'; RENDER.quiz();
}
function quizAnswer(i){
  if (!QZ || QZ.answered) return;
  QZ.answered = true; QZ.chosen = i;
  if (i === QZ.qs[QZ.idx].ans) QZ.scores[QZ.players[QZ.turn]]++;
  RENDER.quiz();
}
function quizNext(){
  if (!QZ) return;
  QZ.answered = false; QZ.chosen = -1; QZ.idx++;
  if (QZ.idx < QZ.qs.length) { RENDER.quiz(); return; }
  if (QZ.mode === 'solo'){
    recordScore(QZ.players[0], QZ.scores[QZ.players[0]]);
    quizStage = 'end';
  } else {
    QZ.turn++; QZ.idx = 0;
    if (QZ.turn >= QZ.players.length){
      QZ.players.forEach(p => recordScore(p, QZ.scores[p]));
      quizStage = 'end';
    } else {
      quizStage = 'handoff';
    }
  }
  RENDER.quiz();
}
function quizRankingHTML(){
  const ranked = QZ.players.map(p => ({ p, s: QZ.scores[p] })).sort((a, b) => b.s - a.s);
  const rows = ranked.map((r, i) => `<tr><td>${i + 1}</td><td>${esc(r.p)}</td><td class="mono" style="text-align:right">${r.s}</td></tr>`).join('');
  return `<div class="method-label"><span class="caps" style="color:var(--accent-ink)">Standings so far</span></div>
    <table class="tbl"><thead><tr><th>#</th><th>Player</th><th style="text-align:right">Score</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function quizLeaderboardHTML(){
  const entries = Object.keys(S.quizScores);
  if (!entries.length) return `<div class="method-label"><span class="caps" style="color:var(--accent-ink)">Leaderboard</span></div>
    <div class="card muted" style="font-size:14px">No rounds played yet. The first Thai Master is up for grabs.</div>`;
  const ranked = entries.map(n => ({ n, best: S.quizScores[n].best, rounds: S.quizScores[n].rounds })).sort((a, b) => b.best - a.best || b.rounds - a.rounds);
  const rows = ranked.map((r, i) => `<tr><td>${i + 1}</td><td>${esc(r.n)}</td><td class="mono" style="text-align:right">${r.best}</td><td class="mono" style="text-align:right">${r.rounds}</td></tr>`).join('');
  return `<div class="method-label"><span class="caps" style="color:var(--accent-ink)">Leaderboard</span></div>
    <table class="tbl"><thead><tr><th>#</th><th>Player</th><th style="text-align:right">Best</th><th style="text-align:right">Rounds</th></tr></thead><tbody>${rows}</tbody></table>
    <p class="lede" style="font-size:12.5px;margin-top:8px">Scores are saved on this phone only — a family home console, not a global ranking.</p>`;
}
function quizPlayHTML(){
  const q = QZ.qs[QZ.idx], player = QZ.players[QZ.turn];
  const scoreLine = QZ.mode === 'champ' ? `${player} · score ${QZ.scores[player]}` : `Score ${QZ.scores[player]}`;
  const opts = q.opts.map((o, i) => {
    let cls = 'quizopt';
    if (QZ.answered){ cls += i === q.ans ? ' correct' : (i === QZ.chosen ? ' wrong' : ' dim'); }
    return `<button class="${cls}" data-action="quiz-answer" data-arg="${i}"${QZ.answered ? ' disabled' : ''}>${esc(o)}</button>`;
  }).join('');
  const lastQ = QZ.idx + 1 >= QZ.qs.length;
  const nextLbl = lastQ ? (QZ.mode === 'solo' ? 'See your score' : 'Finish turn') : 'Next question';
  return `
    <div class="quizbar"><span class="chip">${esc(q.cat)}</span><span class="qprog mono">Question ${QZ.idx + 1} / ${QZ.qs.length}</span></div>
    <div class="quizscore caps">${esc(scoreLine)}</div>
    <div class="quizq">${esc(q.q)}</div>
    <div class="quizopts">${opts}</div>
    ${QZ.answered ? `<div class="quizfact ${QZ.chosen === q.ans ? 'right' : 'notright'}"><b>${QZ.chosen === q.ans ? 'Correct!' : 'Not quite.'}</b> ${esc(q.fact)}</div>
      <button class="btn" data-action="quiz-next">${nextLbl}</button>` : ''}`;
}
function quizHandoffHTML(){
  const next = QZ.players[QZ.turn];
  const first = QZ.turn === 0;
  return `${first ? '' : quizRankingHTML()}
    <div class="handoff">
      <div class="handicon">📱→</div>
      <h3 class="display">Hand the phone to</h3>
      <div class="handname">${esc(next)}</div>
      <p class="muted">No peeking, everyone else — same ten questions for all.</p>
      <button class="btn" data-action="quiz-begin-turn">${esc(next)} is ready</button>
    </div>`;
}
function quizEndHTML(){
  if (QZ.mode === 'solo'){
    const player = QZ.players[0], score = QZ.scores[player], total = QZ.qs.length;
    const best = (S.quizScores[player] || {}).best || score;
    const msg = score >= 9 ? 'Thai Master!' : score >= 7 ? 'Seriously impressive.' : score >= 5 ? 'Solid effort.' : 'Room to grow — play again!';
    return `<div class="quizend">
      <div class="overline">Round complete</div>
      <div class="bigscore display">${score}<span>/ ${total}</span></div>
      <h3 class="display">${esc(player)} — ${msg}</h3>
      <p class="muted">Personal best: ${best} / ${total}</p>
      <button class="btn" data-action="quiz-solo-setup" style="margin-top:14px">Play again</button>
      <div style="height:8px"></div>
      <button class="btn ghost" data-action="quiz-menu">Back to menu</button>
    </div>${quizLeaderboardHTML()}`;
  }
  const ranked = QZ.players.map(p => ({ p, s: QZ.scores[p] })).sort((a, b) => b.s - a.s);
  const total = QZ.qs.length;
  const podium = ranked.map((r, i) => {
    const medal = ['🥇', '🥈', '🥉'][i] || (i + 1) + '.';
    return `<div class="podrow ${i === 0 ? 'win' : ''}"><span class="pod-m">${medal}</span><span class="pod-n">${esc(r.p)}</span><span class="pod-s mono">${r.s} / ${total}</span></div>`;
  }).join('');
  return `<div class="quizend">
    <div class="overline">Championship result</div>
    <h3 class="display" style="margin-bottom:4px">👑 ${esc(ranked[0].p)} wins!</h3>
    <div class="podium">${podium}</div>
    <button class="btn" data-action="quiz-champ-setup" style="margin-top:6px">Rematch</button>
    <div style="height:8px"></div>
    <button class="btn ghost" data-action="quiz-menu">Back to menu</button>
  </div>${quizLeaderboardHTML()}`;
}

/* ---- itinerary sheets ---- */
function findDay(id){ return S.itinerary.find(d => d.id === id); }
function editItemSheet(dayId, itemId){
  const day = findDay(dayId); if (!day) return;
  const isNew = !itemId;
  const item = isNew ? { time:'', text:'' } : day.items.find(i => i.id === itemId);
  if (!item) return;
  const sh = openSheet(`

    <div class="field"><label>Time (optional)</label><input id="fTime" type="time" value="${esc(item.time)}"></div>
    <div class="field"><label>What's happening?</label><input id="fText" placeholder="Elephant sanctuary day" value="${esc(item.text)}"></div>

  `);

    else { item.time = time; item.text = text; }

}
function editDaySheet(dayId){
  const isNew = !dayId;
  const day = isNew ? null : findDay(dayId);
  if (!isNew && !day) return;
  const sh = openSheet(`
    ${sheetHead(isNew ? 'New day' : 'Edit day')}
    <div class="field"><label>Day title</label><input id="fTitle" placeholder="Chiang Mai" value="${isNew ? '' : esc(day.title)}"></div>
    <div class="btnrow">${isNew ? '' : '<button class="btn warn" id="fDel">Delete day</button>'}<button class="btn" id="fSave">Save</button></div>
  `);
  sh.querySelector('#fSave').onclick = () => {
    const t = sh.querySelector('#fTitle').value.trim(); if (!t) return;
    if (isNew) S.itinerary.push({ id: uid(), title: t, sub: '', items: [] });
    else { day.title = t; day.sub = ''; }

/* ---- packing ---- */
let packTraveler = 0;
function packingSheet(){
  const nm = names();
  if (packTraveler >= nm.length) packTraveler = 0;
  const chips = nm.map((n, i) => `<button class="fchip ${i === packTraveler ? 'on' : ''}" data-action="pack-traveler" data-arg="${i}">${esc(n)}</button>`).join('');
  let groups = '', done = 0, total = 0;
  PACK.forEach((g, gi) => {
    groups += `<div class="packgroup"><div class="method-label" style="margin:14px 0 4px"><span class="caps" style="color:var(--accent-ink)">${esc(g.cat)}</span></div>`;
    g.items.forEach((it, ii) => {
      const k = packTraveler + ':' + gi + ':' + ii;
      const on = !!S.packing[k]; total++; if (on) done++;
      groups += `<button class="packitem ${on ? 'done' : ''}" data-action="pack-toggle" data-arg="${k}"><span class="box">${on ? '✓' : ''}</span><span class="pl">${esc(it)}</span></button>`;
    });
    groups += `</div>`;
  });
  if (S.packCustom.length) {
    groups += `<div class="packgroup"><div class="method-label" style="margin:14px 0 4px"><span class="caps" style="color:var(--accent-ink)">Your extras</span></div>`;
    for (const c of S.packCustom) {
      const k = packTraveler + ':custom:' + c.id;
      const on = !!S.packing[k]; total++; if (on) done++;
      groups += `<button class="packitem ${on ? 'done' : ''}" data-action="pack-toggle" data-arg="${k}"><span class="box">${on ? '✓' : ''}</span><span class="pl">${esc(c.label)}</span></button>`;
    }
    groups += `</div>`;
  }
  const pct = total ? Math.round(done / total * 100) : 0;
  const sh = openSheet(`
    ${sheetHead('Packing')}
    <div class="chiprow" style="margin-top:0">${chips}</div>
    <div class="progress" style="margin-bottom:8px"><div class="fill" style="width:${pct}%"></div></div>
    ${pct === 100 ? '<div class="expected-block"><b>Fully packed.</b> Thailand is not ready for you.</div>' : ''}
    ${groups}
    <div class="addcustom"><input id="packNew" placeholder="Add your own item…"><button class="btn slim" id="packAdd">Add</button></div>
  `);
  sh.querySelector('#packAdd').onclick = () => {
    const v = sh.querySelector('#packNew').value.trim(); if (!v) return;
    S.packCustom.push({ id: uid(), label: v }); save(); packingSheet();
  };
}

async function vaultExport(){
  const seed = await loadVaultSeed();
  const blob = await encryptJSON([...seed, ...S.vaultLocal]);
  if (!blob) return;
  $('#blobOut').hidden = false;
  $('#blobText').value = blob;
  try { await navigator.clipboard.writeText(blob); } catch (e) {}
}

async function journalExport(){
  const txt = [...S.journal].sort((a, b) => a.date.localeCompare(b.date))
    .map(j => niceDate(j.date) + ' — ' + (MOODS[j.mood] || '') + '\n' + j.text).join('\n\n');

}

/* ---------------- boot / lock flow ---------------- */
function bootApp(){
  $('#lock').hidden = true;
  $('#siteHeader').hidden = false;
  $('#app').hidden = false;
  $('#nav').hidden = false;
  showView('home');
}
function showLock(){
  $('#lock').hidden = false;
  const form = $('#lockForm');
  form.addEventListener('submit', async ev => {
    ev.preventDefault();
    const pass = $('#lockPass').value;
    if (!pass) return;
    $('#lock').classList.add('busy');
    $('#lockErr').textContent = '';
    try {
      const bits = await derive(pass);
      if (b64(bits.slice(0, 32)) === AUTH.verify) {
        localStorage.setItem(KEYSLOT, b64(bits.slice(32)));
        localStorage.setItem(KIDSLOT, AUTH.kid);
        bootApp();
      } else {
        $('#lockErr').textContent = 'That\'s not it — ask the trip organiser.';
        $('#lockPass').value = '';
      }
    } catch (e) {
      $('#lockErr').textContent = 'Unlock failed on this device.';
    }
    $('#lock').classList.remove('busy');
  });
}
(function init(){
  if (!subtle || AUTH.salt.indexOf('__') === 0) {
    // No WebCrypto (plain file:// copy) or unbuilt auth — open without the lock.
    bootApp();
    return;
  }
  // Stale-key re-lock: a key derived from an older passcode generation must not
  // unlock silently after a passcode change. Drop it and demand the new passcode.
  if (localStorage.getItem(KEYSLOT) && localStorage.getItem(KIDSLOT) !== AUTH.kid) {
    localStorage.removeItem(KEYSLOT);
  }
  if (localStorage.getItem(KEYSLOT)) bootApp();
  else showLock();
})();

/* ---------------- edition updates ----------------
   Offline-first means the app shows the cached edition instantly; this
   banner makes sure nobody silently stays on an old one. */
function showUpdateBar(){
  if ($('#updateBar')) return;
  const bar = document.createElement('button');
  bar.id = 'updateBar';
  bar.innerHTML = 'A new edition is ready <span>Tap to refresh</span>';
  bar.onclick = () => location.reload();
  document.body.appendChild(bar);
}
const BUILD = (document.querySelector('meta[name="tt-build"]') || {}).content || '';
let lastEditionCheck = 0;
async function checkEdition(){
  if (location.protocol.indexOf('http') !== 0 || !navigator.onLine) return;
  if (Date.now() - lastEditionCheck < 60000) return;
  lastEditionCheck = Date.now();
  try {
    const res = await fetch('index.html?nocache=' + Date.now());
    if (!res.ok) return;
    const m = (await res.text()).match(/tt-build" content="([^"]+)"/);
    if (m && BUILD && m[1] !== BUILD) showUpdateBar();
  } catch (e) { /* offline — the cached edition is the whole point */ }
}

/* Offline support when hosted (no-op as a plain file) */
if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
  // belt: the worker messages us when it spots fresher content
  navigator.serviceWorker.addEventListener('message', ev => { if (ev.data === 'tt-updated') showUpdateBar(); });
  // braces: the page verifies its own edition against the server
  setTimeout(checkEdition, 1200);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) checkEdition(); });
}
